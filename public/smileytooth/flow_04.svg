<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#0a0a1a" rx="12"/>
  <rect x="20" y="20" width="360" height="210" rx="8" fill="#101018" stroke="#fbbf2430" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Care Routine</text>
  <!-- Timer -->
  <circle cx="200" cy="120" r="50" fill="#fbbf2410" stroke="#fbbf24" stroke-width="2"/>
  <text x="200" y="128" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#fbbf24">2:30</text>
  <text x="200" y="145" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b8b94">remaining</text>
  <!-- Progress ring -->
  <circle cx="200" cy="120" r="45" fill="none" stroke="#fbbf2430" stroke-width="4" stroke-dasharray="210 80" transform="rotate(-90 200 120)"/>
  <!-- Step indicators -->
  <rect x="60" y="190" width="70" height="25" rx="6" fill="#34d39920"/>
  <text x="95" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="#34d399">✓ Brush</text>
  <rect x="165" y="190" width="70" height="25" rx="6" fill="#fbbf2420" stroke="#fbbf2440" stroke-width="1"/>
  <text x="200" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="#fbbf24">● Floss</text>
  <rect x="270" y="190" width="70" height="25" rx="6" fill="#1e1e28"/>
  <text x="305" y="207" text-anchor="middle" font-family="Arial" font-size="9" fill="#5a5a64">○ Rinse</text>
</svg>