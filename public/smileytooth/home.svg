  <text x="44" y="200" font-family="Arial" font-size="48" font-weight="bold" fill="#38bdf8">87</text>
  <text x="120" y="200" font-family="Arial" font-size="14" fill="#34d399">/ 100</text>
  <text x="44" y="230" font-family="Arial" font-size="12" fill="#34d399">Great! Your teeth are healthy</text>
  <rect x="280" y="140" width="60" height="60" rx="30" fill="#38bdf810" stroke="#38bdf830" stroke-width="1"/>
  <text x="310" y="178" text-anchor="middle" font-family="Arial" font-size="24" fill="#38bdf8">😊</text>
  <!-- Quick Actions -->
  <text x="24" y="300" font-family="Arial" font-size="14" font-weight="bold" fill="white">Quick Actions</text>
  <rect x="24" y="320" width="105" height="90" rx="12" fill="#38bdf810" stroke="#38bdf820" stroke-width="1"/>
  <text x="76" y="365" text-anchor="middle" font-family="Arial" font-size="24">📷</text>
  <text x="76" y="390" text-anchor="middle" font-family="Arial" font-size="11" fill="#38bdf8">Scan</text>
  <rect x="142" y="320" width="105" height="90" rx="12" fill="#a78bfa10" stroke="#a78bfa20" stroke-width="1"/>
  <text x="195" y="365" text-anchor="middle" font-family="Arial" font-size="24">📅</text>
  <text x="195" y="390" text-anchor="middle" font-family="Arial" font-size="11" fill="#a78bfa">Book</text>
  <rect x="260" y="320" width="105" height="90" rx="12" fill="#34d39910" stroke="#34d39920" stroke-width="1"/>
  <text x="312" y="365" text-anchor="middle" font-family="Arial" font-size="24">🤖</text>
  <text x="312" y="390" text-anchor="middle" font-family="Arial" font-size="11" fill="#34d399">AI Chat</text>
