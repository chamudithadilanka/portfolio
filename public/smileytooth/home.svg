  <text x="24" y="450" font-family="Arial" font-size="14" font-weight="bold" fill="white">Upcoming</text>
  <rect x="24" y="470" width="342" height="70" rx="12" fill="#101018" stroke="#1e1e28" stroke-width="1"/>
  <circle cx="59" cy="505" r="20" fill="#a78bfa15"/>
  <text x="59" y="510" text-anchor="middle" font-family="Arial" font-size="14">🦷</text>
  <text x="90" y="498" font-family="Arial" font-size="13" font-weight="bold" fill="white">Dental Checkup</text>
  <text x="90" y="518" font-family="Arial" font-size="11" fill="#8b8b94">Tomorrow, 10:00 AM</text>
  <!-- Bottom Nav -->
  <rect x="0" y="780" width="390" height="64" fill="#101018" stroke="#1e1e28" stroke-width="1"/>
  <text x="78" y="818" text-anchor="middle" font-family="Arial" font-size="10" fill="#8b8b94">Home</text>
  <text x="195" y="818" text-anchor="middle" font-family="Arial" font-size="10" fill="#38bdf8">Scan</text>
  <text x="312" y="818" text-anchor="middle" font-family="Arial" font-size="10" fill="#8b8b94">Profile</text>
