<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <rect width="390" height="844" fill="#0a0a1a"/>
  <rect x="0" y="0" width="390" height="100" fill="#101018"/>
  <text x="24" y="45" font-family="Arial" font-size="14" fill="#8b8b94">Good morning,</text>
  <text x="24" y="70" font-family="Arial" font-size="20" font-weight="bold" fill="white">Chamuditha</text>
