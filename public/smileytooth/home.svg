  <text x="350" y="55" text-anchor="middle" font-family="Arial" font-size="12" fill="#38bdf8">CD</text>
  <!-- Health Score Card -->
  <rect x="24" y="120" width="342" height="140" rx="16" fill="#101018" stroke="#1e1e28" stroke-width="1"/>
