<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#0a0a1a" rx="12"/>
  <rect x="20" y="20" width="360" height="210" rx="8" fill="#101018" stroke="#a78bfa30" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Plaque Detection</text>
  <!-- Teeth with plaque overlay -->
  <rect x="100" y="70" width="200" height="120" rx="8" fill="#0a0a1a"/>
  <ellipse cx="150" cy="120" rx="25" ry="40" fill="white" opacity="0.15"/>
  <ellipse cx="200" cy="115" rx="22" ry="42" fill="white" opacity="0.15"/>
  <ellipse cx="250" cy="120" rx="25" ry="40" fill="white" opacity="0.15"/>
  <!-- Plaque highlights -->
  <ellipse cx="150" cy="140" rx="15" ry="10" fill="#fbbf24" opacity="0.4"/>
  <ellipse cx="200" cy="145" rx="12" ry="8" fill="#f472b6" opacity="0.4"/>
  <ellipse cx="250" cy="138" rx="10" ry="10" fill="#fbbf24" opacity="0.3"/>
  <!-- Legend -->
  <circle cx="120" cy="210" r="5" fill="#fbbf24"/>
  <text x="132" y="214" font-family="Arial" font-size="9" fill="#8b8b94">Moderate</text>
  <circle cx="200" cy="210" r="5" fill="#f472b6"/>
  <text x="212" y="214" font-family="Arial" font-size="9" fill="#8b8b94">Heavy</text>
  <circle cx="270" cy="210" r="5" fill="#34d399"/>
  <text x="282" y="214" font-family="Arial" font-size="9" fill="#8b8b94">Clean</text>
</svg>