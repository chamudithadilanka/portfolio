<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#0a0a1a" rx="12"/>
  <rect x="20" y="20" width="360" height="210" rx="8" fill="#101018" stroke="#38bdf830" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">Scan Flow</text>
  <!-- Steps -->
  <circle cx="60" cy="100" r="15" fill="#38bdf820" stroke="#38bdf8" stroke-width="2"/>
  <text x="60" y="105" text-anchor="middle" font-family="Arial" font-size="12" fill="#38bdf8">1</text>
  <line x1="80" y1="100" x2="120" y2="100" stroke="#38bdf840" stroke-width="2"/>
  <circle cx="140" cy="100" r="15" fill="#a78bfa20" stroke="#a78bfa" stroke-width="2"/>
  <text x="140" y="105" text-anchor="middle" font-family="Arial" font-size="12" fill="#a78bfa">2</text>
  <line x1="160" y1="100" x2="200" y2="100" stroke="#a78bfa40" stroke-width="2"/>
  <circle cx="220" cy="100" r="15" fill="#34d39920" stroke="#34d399" stroke-width="2"/>
  <text x="220" y="105" text-anchor="middle" font-family="Arial" font-size="12" fill="#34d399">3</text>
  <line x1="240" y1="100" x2="280" y2="100" stroke="#34d39940" stroke-width="2"/>
  <circle cx="300" cy="100" r="15" fill="#fbbf2420" stroke="#fbbf24" stroke-width="2"/>
  <text x="300" y="105" text-anchor="middle" font-family="Arial" font-size="12" fill="#fbbf24">4</text>
  <text x="60" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b8b94">Capture</text>
  <text x="140" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b8b94">Analyze</text>
  <text x="220" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b8b94">Report</text>
  <text x="300" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#8b8b94">Tips</text>
  <text x="200" y="190" text-anchor="middle" font-family="Arial" font-size="10" fill="#5a5a64">Guided step-by-step smile capture</text>
</svg>